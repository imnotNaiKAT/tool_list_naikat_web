* {

}
body {

}
.loader {

  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.loader.gone {
  opacity: 0;
  pointer-events: none;
}
.loader::after {
  content: "";
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top: 3px solid var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin {

}
.header {

}
.theme-switch {

}
.theme-btn {

}
.theme-btn.active {

}
.auth-input {

.profile-btn {

// 全局变量
let myFavorites = []; // 我的收藏
let myLikes = [];     // 我的点赞
let currentUser = null;

// 加载动画
const loader = document.getElementById('loader');
window.addEventListener('load', () => {
  renderTools(); // 渲染工具列表
  setTimeout(() => loader.classList.add('gone'), 500);
  checkLogin(); // 检查登录状态
});

// 渲染工具列表
function renderTools(filter = "all") {
  const listContainer = document.getElementById('list');
  listContainer.innerHTML = "";
  
  let filteredTools = toolsData;
  if (filter === "myfavs") {
    filteredTools = toolsData.filter(tool => myFavorites.includes(tool.name));
  } else if (filter === "mylikes") {
    filteredTools = toolsData.filter(tool => myLikes.includes(tool.name));
  } else if (filter !== "all") {
    filteredTools = toolsData.filter(tool => tool.tags.includes(filter));
  }

  if (filteredTools.length === 0) {
    listContainer.innerHTML = '<div class="empty">暂无相关工具</div>';
    return;
  }

  filteredTools.forEach(tool => {
    const isFavorited = myFavorites.includes(tool.name);
    const isLiked = myLikes.includes(tool.name);
    
    const card = document.createElement('a');
    card.className = "tool-card";
    card.dataset.tags = tool.tags;
    card.href = tool.url;
    card.target = "_blank";
    card.innerHTML = `
      <div class="tool-actions">
        <button class="action-btn favorite-btn ${isFavorited ? 'favorited' : ''}" 
                onclick="toggleFavorite(event, '${tool.name}')" 
                title="${isFavorited ? '取消收藏' : '收藏'}">
          ${isFavorited ? '❤️' : '♡'}
        </button>
        <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" 
                onclick="toggleLike(event, '${tool.name}')" 
                title="${isLiked ? '取消点赞' : '点赞'}">
          ${isLiked ? '👍' : '⊕'}
        </button>
      </div>
      <h3>${tool.name}</h3>
      <p>${tool.desc}</p>
    `;
    listContainer.appendChild(card);
  });
}

// 主题切换
const themes = document.querySelectorAll('.theme-btn');
themes.forEach(btn => {
  btn.addEventListener('click', () => {
    themes.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.body.className = btn.dataset.theme;
    localStorage.setItem('theme', btn.dataset.theme);
  });
});
const savedTheme = localStorage.getItem('theme');
if(savedTheme) {
  document.body.className = savedTheme;
  document.querySelector(`[data-theme="${savedTheme}"]`).classList.add('active');
}

// 分类切换
const cats = document.querySelectorAll('.cat');
cats.forEach(cat => {
  cat.addEventListener('click', () => {
    cats.forEach(c => c.classList.remove('active'));
    cat.classList.add('active');
    renderTools(cat.dataset.cat);
  });
});

// 搜索功能
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const kw = searchInput.value.toLowerCase().trim();
  const listContainer = document.getElementById('list');
  const cards = listContainer.querySelectorAll('.tool-card');
  
  cards.forEach(card => {
    const name = card.querySelector('h3').innerText.toLowerCase();
    const desc = card.querySelector('p').innerText.toLowerCase();
    card.style.display = (name.includes(kw) || desc.includes(kw)) ? 'block' : 'none';
  });
});

window.addEventListener('scroll', () => {
  toTopBtn.classList.toggle('show', window.scrollY > 300);
});
toTopBtn.addEventListener('click', () => {
  window.scrollTo({ top:0, behavior: 'smooth' });
});

// ===== 登录/注册功能 =====
function checkLogin() {
  const token = localStorage.getItem("token");
  if (token) {
    // 验证token并加载用户信息
    fetch(`${API_BASE}/api/user/info`, {
      headers: { "Authorization": `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        currentUser = data.data;
        updateUserUI();
        loadMyFavorites();
        loadMyLikes();
        // 显示"我的收藏/点赞"分类
        document.getElementById('myfavs-cat').style.display = 'block';
        document.getElementById('mylikes-cat').style.display = 'block';
      } else {
        logout();
      }
    })
    .catch(() => logout());
  } else {
    // 未登录隐藏个人分类
    document.getElementById('myfavs-cat').style.display = 'none';
    document.getElementById('mylikes-cat').style.display = 'none';
  }
}

function updateUserUI() {
  document.getElementById('uname').textContent = currentUser.nickname;
  document.getElementById('user-avatar').src = currentUser.avatar;
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('user-info').style.display = 'flex';
}

function logout() {
  localStorage.removeItem("token");
  currentUser = null;
  myFavorites = [];
  myLikes = [];
  document.getElementById('login-box').style.display = 'flex';
  document.getElementById('user-info').style.display = 'none';
  document.getElementById('myfavs-cat').style.display = 'none';
  document.getElementById('mylikes-cat').style.display = 'none';
  renderTools(); // 重新渲染工具列表
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  
  if (!username || !password) {
    alert("请输入用户名和密码");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    
    if (data.success) {
      localStorage.setItem("token", data.token);
      alert("登录成功！");
      checkLogin();
    } else {
      alert(data.msg || "登录失败");
    }
  } catch (e) {
    alert("登录失败：" + e.message);
  }
}

async function register() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  
  if (!username || !password) {
    alert("请输入用户名和密码");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    
    alert(data.msg || "注册失败");
    if (data.success) {
      document.getElementById('password').value = "";
    }
  } catch (e) {
    alert("注册失败：" + e.message);
  }
}

// ===== 收藏功能 =====
async function loadMyFavorites() {
  const token = localStorage.getItem("token");
  if (!token) return;

  try {
    const res = await fetch(`${API_BASE}/api/tool/myfavorites`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    
    if (data.success) {
      myFavorites = data.data;
      renderTools(); // 重新渲染工具状态
      updateMyFavoritesList(); // 更新个人中心收藏列表
    }
  } catch (e) {
    console.error("加载收藏失败：", e);
  }
}

async function toggleFavorite(e, toolName) {
  e.preventDefault(); // 阻止跳转
  const token = localStorage.getItem("token");
  if (!token) {
    alert("请先登录！");
    return;
  }

  const isFavorited = myFavorites.includes(toolName);
  const url = isFavorited ? `${API_BASE}/api/tool/unfavorite` : `${API_BASE}/api/tool/favorite`;
  
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ toolName })
    });
    const data = await res.json();
    
    if (data.success) {
      if (isFavorited) {
        myFavorites = myFavorites.filter(item => item !== toolName);
      } else {
        myFavorites.push(toolName);
      }
      renderTools(); // 重新渲染
      updateMyFavoritesList(); // 更新个人中心
      alert(data.msg);
    } else {
      alert(data.msg);
    }
  } catch (e) {
    alert("操作失败：" + e.message);
  }
}

// ===== 个人中心 =====
function showProfile() {
  if (!currentUser) return;
  
  // 填充个人信息
  document.getElementById('profile-avatar').src = currentUser.avatar;
  document.getElementById('profile-nickname').textContent = currentUser.nickname;
  document.getElementById('profile-username').textContent = `用户名：${currentUser.username}`;
  document.getElementById('profile-create').textContent = `注册时间：${currentUser.createTime || '未知'}`;
  
  // 填充修改表单
  document.getElementById('new-nickname').value = currentUser.nickname;
  document.getElementById('new-avatar').value = currentUser.avatar;
  
  // 更新收藏/点赞列表
  updateMyFavoritesList();
  updateMyLikesList();
  
  // 显示弹窗
  document.getElementById('profile-modal').classList.add('show');
}

function hideProfile() {
  document.getElementById('profile-modal').classList.remove('show');
}

function updateMyFavoritesList() {
  const listEl = document.getElementById('my-favorites-list');
  listEl.innerHTML = "";
  
  if (myFavorites.length === 0) {
    listEl.innerHTML = '<div style="color:var(--subtext);padding:10px 0">暂无收藏</div>';
    return;
  }
  
  myFavorites.forEach(toolName => {
    const item = document.createElement('div');
    item.className = "my-tool-item";
    item.innerHTML = `
      <span>${toolName}</span>
      <span class="my-tool-remove" onclick="toggleFavorite(null, '${toolName}')">取消</span>
    `;
    listEl.appendChild(item);
  });
}

function updateMyLikesList() {
  const listEl = document.getElementById('my-likes-list');
  listEl.innerHTML = "";
  
  if (myLikes.length === 0) {
    listEl.innerHTML = '<div style="color:var(--subtext);padding:10px 0">暂无点赞</div>';
    return;
  }
  
  myLikes.forEach(toolName => {
    const item = document.createElement('div');
    item.className = "my-tool-item";
    item.innerHTML = `
      <span>${toolName}</span>
      <span class="my-tool-remove" onclick="toggleLike(null, '${toolName}')">取消</span>
    `;
    listEl.appendChild(item);
  });
}

async function updateProfile() {
  const token = localStorage.getItem("token");
  if (!token) return;
  
  const newNickname = document.getElementById('new-nickname').value.trim();
  const newAvatar = document.getElementById('new-avatar').value.trim() || `https://ui-avatars.com/api/?name=${newNickname}&background=random`;
  
  if (!newNickname) {
    alert("昵称不能为空！");
    return;
  }
  
  try {
    const res = await fetch(`${API_BASE}/api/user/update`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ nickname: newNickname, avatar: newAvatar })
    });
    const data = await res.json();
    
    if (data.success) {
      currentUser.nickname = newNickname;
      currentUser.avatar = newAvatar;
      updateUserUI();
      showProfile(); // 刷新弹窗
      alert("修改成功！");
    } else {
      alert(data.msg);
    }
  } catch (e) {
    alert("修改失败：" + e.message);
  }
}
